server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/book_store?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: bookstore-super-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    default-models-expand-depth: 1
    doc-expansion: none
  show-actuator: false
  packages-to-scan: com.bookstore.controller

app:
  base:
    url: http://localhost:5173